name = "copyvending-uploads"
main = "worker/index.ts"
compatibility_date = "2024-11-01"

# R2 bucket binding (used by the Worker to delete objects).
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "copyvending"

[vars]
R2_ACCOUNT_ID = "5e9102f62162d87f67622085dc6528b3"
R2_BUCKET = "copyvending"
# Restringe esto al dominio de tu web en producción, p.ej.
# "https://copyvending.vercel.app,http://localhost:8124"
ALLOWED_ORIGIN = "*"

# Secretos (NO van aquí, se ponen con wrangler secret put):
#   R2_ACCESS_KEY_ID
#   R2_SECRET_ACCESS_KEY
